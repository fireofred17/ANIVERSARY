<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.26.2026 | Our Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Rainbow / Dreamy Sunset Theme */
            --cherry: #D2042D;
            --sunset-orange: #ff5e62;
            --sunset-purple: #4e4376;
            --deep: #1a0004;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            /* Rainbow Gradient Background */
            background: linear-gradient(135deg, #1a0004 0%, #4e4376 50%, #2e0008 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Heartbeat Background */
        #bg-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            opacity: 0.5;
        }

        .chapter {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; transform: scale(0.9);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            text-align: center;
            padding: 20px; box-sizing: border-box;
        }

        .chapter.active {
            opacity: 1; transform: scale(1);
            pointer-events: auto;
        }

        .ui-layer { position: fixed; z-index: 1000; width: 100%; }
        .progress-bar { top: 20px; display: flex; justify-content: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: var(--cherry); box-shadow: 0 0 10px var(--cherry); width: 20px; border-radius: 10px; }

        .btn-next {
            bottom: 40px; right: 40px; position: fixed;
            background: var(--cherry); color: white; border: none;
            padding: 15px 35px; border-radius: 50px; cursor: pointer;
            font-weight: bold; font-size: 1rem;
            box-shadow: 0 0 20px rgba(210, 4, 45, 0.6);
            display: none; /* Initially hidden */
            z-index: 2000;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #ffb7c5; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px; padding: 30px; width: 90%; max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #drop-zone {
            width:100px; height:100px; border:2px dashed #ffb7c5; 
            border-radius:50%; margin: 20px auto; 
            display:flex; align-items:center; justify-content:center;
            cursor: pointer; transition: 0.3s;
        }
        
        #drop-zone:hover { background: rgba(255,183,197,0.2); }

        #scratch-canvas { border-radius: 20px; cursor: crosshair; background: #333; margin: 20px 0; touch-action: none; }
        .infinity-box { height: 250px; overflow-y: auto; text-align: left; padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="ui-layer progress-bar" id="progressBar"></div>
    <button class="btn-next" id="nextBtn" onclick="nextChapter()">Next Chapter →</button>

    <div class="chapter active" id="c1">
        <h1>Rainbow of Us</h1>
        <div class="glass-card">
            <p>Our first year has been a dream.</p>
            <div id="drop-zone" title="Click or Drag Heart Here">?</div>
            <div id="drag-heart" draggable="true" ondragstart="drag(event)" style="font-size: 3.5rem; cursor: grab;">❤️</div>
            <p style="font-size: 0.8rem; opacity: 0.8; margin-top: 10px;">Tap or Drag the heart to the circle</p>
        </div>
    </div>

    <div class="chapter" id="c2">
        <h1>Chapter 2: The Map</h1>
        <div class="glass-card">
            <p>I'm here in <b>Kota</b>, grinding for our future.</p>
            <div style="font-size: 3rem; margin: 20px 0;">📍 ──────── 💓</div>
            <p>Every formula leads back to you.</p>
        </div>
    </div>

    <div class="chapter" id="c3">
        <h1>Chapter 3: Hidden Magic</h1>
        <canvas id="scratch-canvas" width="300" height="300"></canvas>
    </div>

    <div class="chapter" id="c13">
        <h1>Chapter 13: Infinity</h1>
        <div class="glass-card">
            <div class="infinity-box" id="infinityList"></div>
            <p style="margin-top: 15px;">Never-ending, just like us.</p>
        </div>
    </div>

    <script>
        let currentChapter = 1;
        const totalChapters = 13;

        // Progress Dots
        const pb = document.getElementById('progressBar');
        for(let i=1; i<=totalChapters; i++) {
            const dot = document.createElement('div');
            dot.className = `dot ${i===1 ? 'active' : ''}`;
            dot.id = `dot-${i}`;
            pb.appendChild(dot);
        }

        // --- FIXED UNLOCK LOGIC ---
        function unlockVault() {
            const dropZone = document.getElementById('drop-zone');
            const dragHeart = document.getElementById('drag-heart');
            const nextBtn = document.getElementById('nextBtn');
            
            dropZone.innerHTML = "❤️";
            dropZone.style.border = "none";
            dragHeart.style.display = "none";
            nextBtn.style.display = "block"; // FORCING BUTTON TO SHOW
            
            // Animation for visual confirmation
            nextBtn.animate([
                { transform: 'scale(1)', background: '#D2042D' },
                { transform: 'scale(1.1)', background: '#ff5e62' },
                { transform: 'scale(1)', background: '#D2042D' }
            ], { duration: 1000, iterations: Infinity });
        }

        document.getElementById('drop-zone').onclick = unlockVault;
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        document.getElementById('drop-zone').ondragover = (e) => e.preventDefault();
        document.getElementById('drop-zone').ondrop = (e) => { e.preventDefault(); unlockVault(); };

        function nextChapter() {
            if(currentChapter < totalChapters) {
                document.getElementById(`c${currentChapter}`).classList.remove('active');
                document.getElementById(`dot-${currentChapter}`).classList.remove('active');
                currentChapter++;
                document.getElementById(`c${currentChapter}`).classList.add('active');
                document.getElementById(`dot-${currentChapter}`).classList.add('active');
                
                if(currentChapter === 3) initScratch();
                if(currentChapter === 13) initInfinity();
            }
        }

        // Fix Scratch-off for mobile
        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#4a000e';
            ctx.fillRect(0,0,300,300);
            ctx.globalCompositeOperation = 'destination-out';
            
            const handleScratch = (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
                const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
                ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI*2); ctx.fill();
            };
            canvas.addEventListener('mousemove', handleScratch);
            canvas.addEventListener('touchmove', handleScratch);
        }

        function initInfinity() {
            const list = document.getElementById('infinityList');
            if(list.children.length > 0) return;
            const phrases = ["I Love You", "Main tumse pyar karta hoon", "Te Amo", "Saranghae", "Aishiteru"];
            for(let i=0; i<100; i++) {
                const p = document.createElement('p');
                p.innerText = phrases[i % phrases.length];
                list.appendChild(p);
            }
        }

        // Rainbow Star Background
        const bg = document.getElementById('bg-canvas');
        const bctx = bg.getContext('2d');
        bg.width = window.innerWidth; bg.height = window.innerHeight;
        function drawBg() {
            bctx.clearRect(0,0,bg.width,bg.height);
            for(let i=0; i<80; i++) {
                bctx.fillStyle = `hsla(${Math.random() * 360}, 70%, 70%, 0.8)`;
                bctx.beginPath();
                bctx.arc(Math.random()*bg.width, Math.random()*bg.height, Math.random()*3, 0, Math.PI*2);
                bctx.fill();
            }
        }
        setInterval(drawBg, 100);
    </script>
</body>
</html>
